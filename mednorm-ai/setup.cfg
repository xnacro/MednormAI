# MedNorm AI — pytest & tool configuration
# Run with: pytest  (no args needed, targets backend/tests/ automatically)

[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

[tool:pytest]
log_cli = true
log_cli_level = WARNING

